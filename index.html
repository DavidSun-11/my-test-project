<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的个人网站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6fa;
            color: #333;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        section {
            padding: 40px;
            max-width: 800px;
            margin: auto;
        }
        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #ddd;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h1>你好，我是XXX 👋</h1>
    <p>欢迎来到我的个人网站</p>
</header>

<nav>
    <a href="#">首页</a>
    <a href="#">关于我</a>
    <a href="#">联系我</a>
</nav>

<section>
    <div class="card">
        <h2>关于我</h2>
        <p>这里可以写你的介绍，比如：我是一个刚开始学习AI和编程的新手。</p>
    </div>

    <div class="card">
        <h2>我的技能</h2>
        <ul>
            <li>使用 ChatGPT</li>
            <li>GitHub 基础</li>
            <li>HTML 入门</li>
        </ul>
    </div>

    <div class="card">
        <h2>联系方式</h2>
        <p>Email：your@email.com</p>
    </div>
</section>

<footer>
    <p>© 2026 我的个人网站</p>
</footer>

</body>
</html>
